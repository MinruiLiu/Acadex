name: acadex_mobile
description: Acadex mobile app MVP scaffold.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  # Required so CupertinoIcons font is bundled (otherwise tabs show “?”).
  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.8.4
  file_picker: ^8.1.6
  uuid: ^4.5.1
  path: ^1.9.1
  pdfx: ^2.9.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
